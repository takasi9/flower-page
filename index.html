<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>花畑の朝</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:#ffffff;
}

.main{
    position:relative;
    width:100vw;
    height:100vh;
    overflow:hidden;
}

/* 背景 */
.bg0{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    left:0;
    top:0;
}

.bg1{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    left:0;
    top:0;
}

/* メッセージ */
.message{
    position:absolute;
    top:7%;
    left:3%;
    background:rgba(255,255,255,0.7);
    padding:15px;
    color:#d83b78;
    font-size:2vw;
    font-weight:bold;
    line-height:1.5;
    z-index:20;
}

/* 蝶 */
.butterfly{
    position:absolute;
    width:6%;
    transition:0.3s;
    z-index:15;
}

.b1{left:16%; top:76%;}
.b2{left:36%; top:82%;}
.b3{left:64%; top:76%;}

/* 青い虫 */
.foo{
    position:absolute;
    width:3%;
    transition:0.3s;
    z-index:16;
}

.f1{left:39%; top:42%;}
.f2{left:58%; top:44%;}
.f3{left:71%; top:54%;}
.f4{left:49%; top:57%;}
.f5{left:63%; top:37%;}
.f6{left:39%; top:56%;}

</style>
</head>

<body>

<div class="main">

    <!-- 背景 -->
    <img src="素材/bg0.png" class="bg0">
    <img src="素材/bg1.png" class="bg1">

    <!-- メッセージ -->
    <div class="message">
        ぽかぽか陽気の穏やかな朝<br>
        花畑では、蝶々がのんびり飛んでいます
    </div>

    <!-- 蝶 -->
    <img src="素材/butterfly.gif" class="butterfly b1">
    <img src="素材/butterfly.gif" class="butterfly b2">
    <img src="素材/butterfly.gif" class="butterfly b3">

    <!-- 青い虫 -->
    <img src="素材/foo.gif" class="foo f1">
    <img src="素材/foo.gif" class="foo f2">
    <img src="素材/foo.gif" class="foo f3">
    <img src="素材/foo.gif" class="foo f4">
    <img src="素材/foo.gif" class="foo f5">
    <img src="素材/foo.gif" class="foo f6">

</div>

<script>

// 青い虫
document.querySelectorAll(".foo").forEach(function(el){

    el.addEventListener("mouseover",function(){

        el.style.left=(Math.random()*90)+"%";
        el.style.top=(Math.random()*85)+"%";

    });

});

// 蝶
document.querySelectorAll(".butterfly").forEach(function(el){

    el.addEventListener("mouseover",function(){

        el.style.left=(Math.random()*90)+"%";
        el.style.top=(Math.random()*85)+"%";

    });

});

</script>

</body>
</html>
